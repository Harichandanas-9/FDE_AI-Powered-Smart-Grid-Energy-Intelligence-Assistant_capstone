# ===== Render deployment manifest — AI-Powered Smart Grid Energy Intelligence Assistant =====
# Backend: FastAPI (Python 3.11)
# Frontend: React + Vite static site
# Persistent disk: ChromaDB + data_processed artifacts

services:
  # -------- Backend (FastAPI) --------
  - type: web
    name: smart-grid-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install -r requirements-ml.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
    disk:
      name: chroma-disk
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_LOG_LEVEL
        value: INFO
      - key: DATA_DIR
        value: /var/data/datasets
      - key: CHROMA_PERSIST_DIR
        value: /var/data/chroma_store
      - key: CORS_ORIGINS
        value: https://smart-grid-frontend.onrender.com,http://localhost:5173
      - key: MULTI_TENANCY_ENABLED
        value: "false"
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      # Embedding: 3-tier fallback — sentence-transformers → fastembed → hash
      # Free tier has 512MB RAM; fastembed (ONNX) is lighter than torch/MiniLM.
      # Code auto-falls back: if sentence-transformers OOMs, fastembed takes over;
      # if that also fails, HashEmbedder runs with zero extra RAM.
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: FASTEMBED_MODEL
        value: BAAI/bge-small-en-v1.5

      # Chunking
      - key: CHUNK_STRATEGY
        value: sentence
      - key: CHUNK_SIZE
        value: "4"
      - key: CHUNK_OVERLAP
        value: "1"

      # Reranker: CrossEncoder → ScoreFusion auto-fallback (no crash if model missing)
      - key: RERANKER_ENABLED
        value: "true"
      - key: RERANKER_MODEL
        value: cross-encoder/ms-marco-MiniLM-L-6-v2

      # Retrieval
      - key: RETRIEVAL_TOP_K
        value: "20"
      - key: FINAL_TOP_K
        value: "5"
      - key: RRF_SEMANTIC_WEIGHT
        value: "0.6"
      - key: RRF_KEYWORD_WEIGHT
        value: "0.4"
      - key: CRAG_RELEVANCE_THRESHOLD
        value: "0.0"

      # Semantic cache
      - key: SEMANTIC_CACHE_THRESHOLD
        value: "0.92"
      - key: SEMANTIC_CACHE_MAX_ITEMS
        value: "500"

      # LLM fallback chain
      - key: GROQ_MODEL_LARGE
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_SMALL
        value: llama-3.1-8b-instant
      - key: LLM_FALLBACK_CHAIN
        value: groq_large

      - key: PYTHON_VERSION
        value: 3.11.10
      # Set these in Render dashboard — never commit secrets
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  # -------- Frontend (Static Site) --------
  - type: web
    name: smart-grid-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://smart-grid-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

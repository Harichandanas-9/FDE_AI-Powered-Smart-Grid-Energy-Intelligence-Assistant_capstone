# ===== Render deployment manifest — AI-Powered Smart Grid Energy Intelligence Assistant =====
# Backend: FastAPI (Python 3.11)
# Frontend: React + Vite static site
# Persistent disk: ChromaDB + data_processed artifacts

services:
  # -------- Backend (FastAPI) --------
  - type: web
    name: smart-grid-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install -r requirements-ml.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
    disk:
      name: chroma-disk
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_LOG_LEVEL
        value: INFO
      - key: DATA_DIR
        value: /var/data/datasets
      - key: CHROMA_PERSIST_DIR
        value: /var/data/chroma_store
      - key: CORS_ORIGINS
        value: https://smart-grid-frontend.onrender.com,http://localhost:5173
      - key: MULTI_TENANCY_ENABLED
        value: "false"
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      # 'hash' = offline, zero-RAM embedder (reliable on Render free tier, which
      # OOMs loading torch/MiniLM). Switch to a sentence-transformers model only
      # on a paid plan with >=2GB RAM.
      - key: EMBEDDING_MODEL
        value: hash
      - key: RETRIEVAL_TOP_K
        value: "20"
      - key: FINAL_TOP_K
        value: "5"
      - key: PYTHON_VERSION
        value: 3.11.10
      # Set these in Render dashboard — never commit secrets
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  # -------- Frontend (Static Site) --------
  - type: web
    name: smart-grid-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://smart-grid-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
